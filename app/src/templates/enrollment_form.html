{% extends "layout.html" %}

{% block content %}
  <section class="page-header">
    <div>
      <h1>{{ form_title }}</h1>
    </div>
  </section>

  <form method="post" class="form-grid">
    <label>Student
      <select name="student_id" required>
        <option value="">Select student</option>
        {% for student in students %}
          <option value="{{ student.student_id }}" {% if enrollment.student_id == student.student_id %}selected{% endif %}>{{ student.first_name }} {{ student.last_name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Course
      <select name="course_id" required>
        <option value="">Select course</option>
        {% for course in courses %}
          <option value="{{ course.course_id }}" {% if enrollment.course_id == course.course_id %}selected{% endif %}>{{ course.course_code }} - {{ course.course_name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Numeric grade<input type="number" name="grade" min="0" max="100" step="0.01" value="{{ enrollment.grade or '' }}"></label>
    <label>Letter grade
      <select name="letter_grade">
        <option value="">Select letter grade</option>
        {% for option in letter_options %}
          <option value="{{ option }}" {% if enrollment.letter_grade == option %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </label>

    <div class="form-actions">
      <button type="submit">Save</button>
      <a class="button secondary" href="{{ url_for('enrollments') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
